<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Official user documentation for Graiphic Studio, the native visual IDE for FROG programs.">
  <link rel="canonical" href="https://graiphic.github.io/Graiphic-Studio/">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Graiphic Studio Documentation">
  <meta property="og:description" content="Front Panel, Block Diagram, Source view, visual tools, widgets, and FROG document workflows.">
  <meta property="og:url" content="https://graiphic.github.io/Graiphic-Studio/">
  <title>Graiphic Studio Documentation</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    :root {
      --theme-color: #1686d9;
      --body-bg: #f3f5f7;
      --body-color: #20262d;
      --muted-color: #5b6672;
      --heading-color: #151a20;
      --surface: #ffffff;
      --surface-soft: #e9edf1;
      --border: #cbd2d9;
      --sidebar-width: 300px;
      color-scheme: light;
    }

    html[data-theme="dark"] {
      --body-bg: #17191c;
      --body-color: #d8dadd;
      --muted-color: #9ba2aa;
      --heading-color: #f0f1f2;
      --surface: #232529;
      --surface-soft: #2e3136;
      --border: #3f444b;
      color-scheme: dark;
    }

    body {
      color: var(--body-color);
      background: var(--body-bg);
    }

    .sidebar {
      width: var(--sidebar-width);
      color: var(--body-color);
      background: var(--surface);
      border-right: 1px solid var(--border);
    }

    .sidebar .app-name-link,
    .sidebar-nav a,
    .sidebar-nav strong,
    .search input,
    .app-nav a {
      color: var(--body-color);
    }

    .sidebar-nav strong {
      display: block;
      margin-top: 0.85rem;
      color: var(--heading-color);
      font-size: 0.86rem;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .search {
      border-bottom: 1px solid var(--border);
    }

    .search input {
      background: var(--surface-soft);
      border: 1px solid var(--border);
      border-radius: 4px;
    }

    .content {
      left: var(--sidebar-width);
    }

    .markdown-section {
      max-width: 1040px;
      color: var(--body-color);
      padding-bottom: 5rem;
    }

    .markdown-section h1,
    .markdown-section h2,
    .markdown-section h3,
    .markdown-section strong,
    .markdown-section th {
      color: var(--heading-color);
    }

    .markdown-section h1 a,
    .markdown-section h2 a,
    .markdown-section h3 a {
      color: inherit;
    }

    .markdown-section p,
    .markdown-section li,
    .markdown-section td {
      color: var(--body-color);
    }

    .markdown-section img {
      max-width: 100%;
      border: 1px solid var(--border);
      background: var(--surface);
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.16);
    }

    .markdown-section pre,
    .markdown-section code {
      color: var(--body-color);
      background: var(--surface-soft);
    }

    .markdown-section table th,
    .markdown-section table td {
      border-color: var(--border);
    }

    .markdown-section table tr,
    .markdown-section table tbody tr:nth-child(2n) {
      background: var(--body-bg);
    }

    .app-nav {
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: 0;
      padding: 0.45rem 0.75rem;
    }

    .theme-toggle {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 1000;
      width: 42px;
      height: 42px;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--body-color);
      background: var(--surface);
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    .theme-toggle:hover,
    .theme-toggle:focus-visible {
      border-color: var(--theme-color);
      outline: none;
    }

    @media screen and (max-width: 768px) {
      .content { left: 0; }
      .app-nav { border-left: 0; border-right: 0; }
    }
  </style>
</head>
<body>
  <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Switch documentation theme" title="Switch theme">L/D</button>
  <div id="app">Loading Graiphic Studio documentation...</div>
  <script>
    (function () {
      var key = "graiphic-studio-doc-theme";
      var root = document.documentElement;
      var stored = localStorage.getItem(key);
      root.dataset.theme = stored === "light" ? "light" : "dark";

      document.getElementById("theme-toggle").addEventListener("click", function () {
        var next = root.dataset.theme === "dark" ? "light" : "dark";
        root.dataset.theme = next;
        localStorage.setItem(key, next);
      });
    }());

    window.$docsify = {
      name: "Graiphic Studio",
      repo: "Graiphic/Graiphic-Studio",
      homepage: "docs/index.md",
      loadSidebar: true,
      loadNavbar: true,
      auto2top: true,
      relativePath: true,
      subMaxLevel: 2,
      maxLevel: 3,
      alias: {
        "/.*/_sidebar.md": "/_sidebar.md",
        "/.*/_navbar.md": "/_navbar.md"
      },
      search: {
        placeholder: "Search Graiphic Studio",
        noData: "No matching page found.",
        depth: 3
      }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
</body>
</html>
